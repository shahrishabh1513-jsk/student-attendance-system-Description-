<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>EduTrack Pro | Smart Attendance System</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="login-wrapper">
        <div class="login-card animate-fade-up">
            <div class="login-brand">
                <div class="brand-icon"><i class="fas fa-chalkboard-user"></i></div>
                <h1>EduTrack <span>Pro</span></h1>
                <p>AI-powered attendance · Real-time insights</p>
                <div class="brand-features">
                    <span><i class="fas fa-chart-line"></i> Analytics</span>
                    <span><i class="fas fa-users"></i> 240+ Students</span>
                    <span><i class="fas fa-calendar-week"></i> 4 Semesters</span>
                </div>
            </div>
            <div class="login-form-container">
                <div class="form-header">
                    <i class="fas fa-laptop-code"></i>
                    <h3>Teacher Access</h3>
                    <div class="badge-demo">Demo: SOSIT5 / ICAIT1</div>
                </div>
                <div id="login-alert" class="alert-message" style="display: none;">
                    <i class="fas fa-circle-exclamation"></i> Invalid credentials
                </div>
                <form id="login-form">
                    <div class="input-group">
                        <i class="fas fa-user input-icon"></i>
                        <input type="text" id="username" placeholder="Username" autocomplete="off" required>
                    </div>
                    <div class="input-group">
                        <i class="fas fa-lock input-icon"></i>
                        <input type="password" id="password" placeholder="Password" required>
                    </div>
                    <button type="submit" class="btn-glow">
                        <i class="fas fa-arrow-right-to-bracket"></i> Login to Dashboard
                    </button>
                </form>
                <div class="login-footer-note">
                    <i class="fas fa-shield-alt"></i> Secure access · Role-based
                </div>
            </div>
        </div>
    </div>
    <script src="js/main.js"></script>
</body>
</html>
