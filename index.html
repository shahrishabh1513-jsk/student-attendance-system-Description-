<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Student Attendance Management System</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script>
        // Apply saved theme before paint to avoid a flash
        try { document.documentElement.setAttribute('data-theme', localStorage.getItem('attendanceTheme') || 'light'); } catch (e) { document.documentElement.setAttribute('data-theme', 'light'); }
    </script>
</head>
<body>
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>

    <button class="icon-btn no-print" id="theme-toggle" style="position:fixed; top:20px; right:20px; z-index:30;" title="Toggle theme">
        <i class="fas fa-moon"></i>
    </button>

    <div class="login-shell">
        <div class="glass-card login-card">
            <div class="login-logo"><i class="fas fa-user-graduate"></i></div>
            <h1>Welcome Back</h1>
            <p>Sign in to take student attendance</p>

            <div id="login-alert" class="alert alert-danger" style="display:none;">
                <i class="fas fa-circle-exclamation"></i>
                <span>Invalid username or password. Please try again.</span>
            </div>

            <form id="login-form">
                <div class="field">
                    <label for="username">Username</label>
                    <div class="field-input">
                        <i class="fas fa-user"></i>
                        <input type="text" id="username" name="username" placeholder="Enter your username" autocomplete="username" required>
                    </div>
                </div>
                <div class="field">
                    <label for="password">Password</label>
                    <div class="field-input">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="password" name="password" placeholder="Enter your password" autocomplete="current-password" required>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary btn-block login-btn ripple">
                    <i class="fas fa-arrow-right-to-bracket"></i> Sign In
                </button>
            </form>

            <p class="login-hint">Student Attendance Management System · RAS15</p>
        </div>
    </div>

    <footer class="main-footer">
        <p>&copy; 2026 Student Attendance Management System | Designed for Educational Institutions | RAS15</p>
    </footer>

    <script src="js/utils.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
